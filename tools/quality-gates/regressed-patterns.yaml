  # ===========================================================
  # Category 3: Render-failure patterns
  # Origin: publishing-pipeline commits d238f2c, cf24f57, 3208619
  # ===========================================================

  - id: regressed-render-tofu-box
    pattern: '□|�'
    type: regex
    severity: HIGH
    category: render-failure
    description: |
      Tofu-box / replacement-glyph character in source (likely paste
      artifact from a failed render output that got copied back into source).
    origin:
      pass: "Stage 4 render-integrity audit doctrine"
      commit: "d238f2c (Ch 5 + Ch 6 em-dash / approx-symbol fix)"
    allowlist: []

  - id: regressed-render-hyphen-minus-as-em-dash
    pattern: '[a-z] -- [a-z]'
    type: regex
    severity: MEDIUM
    category: render-failure
    description: |
      Two-hyphens-as-em-dash pattern. Should be U+2014 em-dash directly.
      Pandoc handles this in some configs but not all; render-safer to
      use the actual character.
    origin:
      pass: "Stage 4 render-integrity audit doctrine §3.1"
      commit: "(convention)"
    allowlist: []

  - id: regressed-render-approx-tilde
    pattern: '~([0-9])'
    type: regex
    severity: LOW
    category: render-failure
    description: |
      Approximation symbol rendered as tilde rather than U+2248 ≈.
      May be intentional in some contexts (informal "approximately" prefix);
      LOW severity for review.
    origin:
      pass: "Stage 4 render-integrity audit doctrine §3.1"
      commit: "(convention)"
    allowlist: []

  - id: regressed-render-emoji-warning-sign
    pattern: '⚠'
    type: string
    severity: MEDIUM
    category: render-failure
    description: |
      Warning-sign emoji (U+26A0) in publisher-facing prose. EB Garamond
      lacks the glyph in Regular weight (xelatex emits "Missing character"
      to stderr), rendering as a tofu box in the PDF. Almost always
      scaffolding-leakage from LLM-drafter status markers — replace with
      a plain word like "Warning:" or "Note:" rather than fix at the font
      layer (emojis don't belong in trade-press body prose).
    origin:
      pass: "Stage 4 font-coverage audit 2026-05-25 (essays + paratext)"
      commit: "(this commit)"
    allowlist: []

  - id: regressed-render-emoji-check-mark
    pattern: '✓'
    type: string
    severity: MEDIUM
    category: render-failure
    description: |
      Check-mark glyph (U+2713) in publisher-facing prose. EB Garamond
      lacks it in Regular weight; renders as a tofu box. Same disposition
      as the warning-sign emoji entry above — scaffolding leakage; scrub
      from source rather than mapping to a fallback font.
    origin:
      pass: "Stage 4 font-coverage audit 2026-05-25 (essays + paratext)"
      commit: "(this commit)"
    allowlist: []

