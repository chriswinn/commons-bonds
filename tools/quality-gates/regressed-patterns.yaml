  # ===========================================================
  # Tautology-charge guard (2026-06-17 — TA tautology verification)
  # Origin: tools/audits/ta-tautology-verification_2026-06-17.md. Verified
  # against the canonical TA: B<RCV is Empirical Observation 10.1b (NOT a
  # theorem); only the sign-identity CS>0 <=> B<RCV is Theorem 10.1a; the
  # Hotelling Identity is a bridge; the identity RHS is Cost Severance, not
  # consumer surplus. Patterns are AFFIRMATIVE-phrasing only, so a correct
  # disclaimer ("is not a theorem but an empirical observation") does NOT
  # trip them. Escape hatch: per-file allowlist, or --no-verify with author
  # direction. Note: enforced by the pre-commit hook on its --staged scope,
  # which now covers chapters (Chapter_*.md — the __Draft suffix was dropped
  # in the 2026-06 promotion campaign; chapter scope re-enabled 2026-06-18),
  # op-ed.md, AuthorsNote/Dedication, AND essay.md (re-enabled 2026-06-18 with
  # frontmatter-aware body-only scanning), so the matrix->essay and
  # matrix->chapter propagation paths are both under the gate.
  # ===========================================================

  - id: regressed-canon-near-theorem-overclaim
    pattern: 'near.?theorem'
    type: regex
    severity: HIGH
    category: consistency-canon
    description: |
      "near-theorem" escalation for the cost-severance / Hotelling-Identity
      claims. In publisher-facing prose these are an Empirical Observation
      (10.1b) + a bridge, not (near-)theorems. Use "empirical observation" /
      "the framework's bridge."
    origin:
      pass: "TA tautology verification 2026-06-17 (FIX 3)"
      commit: "16475be6"
      ratified: "2026-06-17"
    allowlist: []

  - id: regressed-canon-hotelling-identity-as-theorem
    pattern: '([Hh]otelling [Ii]dentity|[Cc]ost [Ss]everance|[Rr]esidual [Cc]ommons [Vv]alue|aggregate [Bb]ond)[^.]{0,45}(is|as) a (near.?)?theorem'
    type: regex
    severity: HIGH
    category: consistency-canon
    description: |
      Affirmatively calling the Hotelling Identity / Cost Severance / RCV /
      aggregate Bond "a theorem" invites the definitional-tautology charge.
      The Hotelling Identity is a bridge between two independently-measured
      quantities; B<RCV is Empirical Observation 10.1b. Re-word "theorem" ->
      "empirical observation" / "the framework's bridge". Disclaiming usage
      ("is not a theorem") does not match this affirmative pattern.
    origin:
      pass: "TA tautology verification 2026-06-17 (FIX 3)"
      commit: "16475be6"
      ratified: "2026-06-17"
    allowlist: []

  - id: regressed-canon-b-lt-rcv-as-theorem
    pattern: '(B *< *(aggregate )?RCV|[Bb]ond[^.]{0,30}less than[^.]{0,40}[Rr]esidual [Cc]ommons [Vv]alue)[^.]{0,40}(is|as) a (near.?)?theorem|\btheorem that\b[^.]{0,70}(B *< *(aggregate )?RCV|[Bb]ond[^.]{0,30}less than[^.]{0,40}residual commons value)'
    type: regex
    severity: HIGH
    category: consistency-canon
    description: |
      B < RCV (cost severance > 0) is Empirical Observation 10.1b, NOT a
      theorem: RCV (the integral, triangulated) and the posted bond B are
      independently estimated, so the result is empirical, not definitional.
      Only the sign-identity CS>0 <=> B<RCV is Theorem 10.1a. Re-word.
      Disclaiming usage does not match this affirmative pattern.
    origin:
      pass: "TA tautology verification 2026-06-17 (FIX 3)"
      commit: "16475be6"
      ratified: "2026-06-17"
    allowlist: []

