# Regressed-Patterns Registry — invariant-gate corpus-wide institutional memory
#
# Detects patterns previously fixed by rigor passes (corpus-wide institutional
# memory; deprecated terminology; gate-decision-banned patterns; render-failure
# patterns).
#
# Used by tools/scripts/check-corpus-invariants.sh per pipeline doctrine §2.2.
# Schema version 1.0.0 matches scaffolding-patterns.yaml; do not change schema
# without coordinating.
#
# Each entry traces back to the rigor-pass artifact + commit that surfaced /
# fixed the pattern. Allowlists support per-file substantive-use exceptions.

schema_version: "1.0.0"
last_updated: "2026-05-17"
registry_type: "regressed"

# Categories:
#   named-llm-tic       — patterns named in the Pass 2 voice-polish inventory
#   nostalgia-tic       — sentimentality patterns flagged in Pass 2 inventory
#   cadence-repetition  — three-beat-rhythm patterns flagged in Pass 2 inventory
#   deprecated-term     — terminology superseded by canonical naming decision
#   render-failure      — patterns that fail through the publishing pipeline
#   gate-decision-banned — patterns banned by explicit gate decision (e.g., NDA)
#   consistency-canon   — cross-chapter consistency commitments
#
# Severity tiers same as scaffolding-patterns.yaml.

patterns:

  # ===========================================================
  # Category 1: Named LLM tics (from Pass 2 voice-polish inventory)
  # Origin: tools/rigor-passes/commons_bonds_rigor_pass_2026-05-13_ch1_the_quiet_math_stage3_voice_polish_v1.0.0.md
  # ===========================================================

  - id: regressed-nostalgia-tic-not-many-people-like-that
    pattern: 'There are not many people like that anymore'
    type: string
    severity: HIGH
    category: nostalgia-tic
    description: |
      Verbatim named LLM-tic from Pass 2 voice-polish inventory.
      Sentimentality reach for affective landing; trade-press editors
      scan for this exact phrase. Flagged in Ch 1 F-V1 at line 35.
    origin:
      pass: "Ch 1 Pass 2 voice-polish (F-V1)"
      commit: "7b4aa92"
      ratified: "2026-05-15"
    allowlist: []

  - id: regressed-cadence-it-changed-me-it-humbled-me
    pattern: 'It changed me\. It humbled me'
    type: regex
    severity: HIGH
    category: cadence-repetition
    description: |
      Named cadence-repetition tic from Pass 2 voice-polish inventory.
      Three-beat anaphoric pattern reaching for affective landing
      through formulaic repetition. Flagged in Ch 1 F-V2 at line 55.
    origin:
      pass: "Ch 1 Pass 2 voice-polish (F-V2)"
      commit: "7b4aa92"
      ratified: "2026-05-15"
    allowlist: []

  - id: regressed-tidy-parallel-he-would-three-times
    pattern: 'He would [a-z]+\. He would [a-z]+\. He would'
    type: regex
    severity: MEDIUM
    category: named-llm-tic
    description: |
      Tidy-parallel anaphoric "He would X" three-sentence triplet pattern.
      Flagged in Ch 1 F-V3 at line 21 (held as substantively-earned for
      the chapter-load-bearing aphorism build-up; this is the named
      pattern itself flagged for new occurrences elsewhere).
    origin:
      pass: "Ch 1 Pass 2 voice-polish (F-V3)"
      commit: "7b4aa92"
      ratified: "2026-05-15"
    allowlist: []

  - id: regressed-em-dash-density-three-plus
    pattern: '— [^—]{1,40} — [^—]{1,40} —'
    type: regex
    severity: MEDIUM
    category: named-llm-tic
    description: |
      Em-dash density pattern — three em-dashes within close proximity.
      Flagged in Ch 1 F-V4 + F-V8 (NACA paragraph + DMV-commute paragraph).
      Individually defensible parenthetical-extension; cumulative density
      flags as em-dash crutch pattern.
    origin:
      pass: "Ch 1 Pass 2 voice-polish (F-V4, F-V8)"
      commit: "7b4aa92"
      ratified: "2026-05-15"
    allowlist:
      - file: "manuscript/chapters/Chapter__6_ThreeWaysofCounting__Draft.md"
        line: 158
        rationale: "legitimate table headers — M1/M2/M3 column labels use em-dash as column-name separator, not as connective-tissue prose"

  - id: regressed-declarative-three-in-a-row-negation
    pattern: 'He did not [a-z]+\. He did not [a-z]+\. The'
    type: regex
    severity: MEDIUM
    category: named-llm-tic
    description: |
      Declarative-three-in-a-row tic — three short declaratives with
      negation-negation-affirmation cadence and no sentence-length variance.
      Flagged in Ch 1 F-V5 at line 43 (held as substantively-earned for
      framework-precursor-question moment).
    origin:
      pass: "Ch 1 Pass 2 voice-polish (F-V5)"
      commit: "7b4aa92"
      ratified: "2026-05-15"
    allowlist: []

  - id: regressed-anaphoric-he-was-he-held-four-times
    pattern: 'He was [^.]+\. He [a-z]+ [^.]+\. He was [^.]+\. He'
    type: regex
    severity: MEDIUM
    category: named-llm-tic
    description: |
      Anaphoric "He [verb]" four-sentence opening pattern.
      Flagged in Ch 1 F-V6 at line 47 (paragraph opening cadence-burden).
    origin:
      pass: "Ch 1 Pass 2 voice-polish (F-V6)"
      commit: "7b4aa92"
      ratified: "2026-05-15"
    allowlist: []

  # F-V9 through F-V21 entries — placeholder for retrofit registry expansion.
  # Per pipeline doctrine §2.2, the regressed-pattern registry is incrementally
  # populated as rigor-pass artifacts are processed. The above entries are the
  # canonical seed from the Ch 1 Pass 2 voice-polish artifact; F-V9 through
  # F-V21 + Ch 5 + Ch 6 + Tech Appendix pattern-class extractions land via
  # per-chapter retrofit workstreams (per ratified decision #9).

  # ===========================================================
  # Category 2: Connective-tissue clichés (from Pass 2 inventory)
  # ===========================================================

  - id: regressed-cliche-in-short
    pattern: '\bin short\b'
    type: regex
    severity: MEDIUM
    category: named-llm-tic
    description: Connective-tissue cliché named in Pass 2 inventory
    origin:
      pass: "Stage 3 template — Pass 2 voice-polish category 'connective-tissue clichés'"
      commit: "(in template)"
    allowlist: []

  - id: regressed-cliche-ultimately
    pattern: '\bUltimately,'
    type: regex
    severity: MEDIUM
    category: named-llm-tic
    description: Connective-tissue cliché named in Pass 2 inventory
    origin:
      pass: "Stage 3 template — Pass 2 voice-polish category"
      commit: "(in template)"
    allowlist: []

  - id: regressed-cliche-moreover
    pattern: '\bMoreover,'
    type: regex
    severity: MEDIUM
    category: named-llm-tic
    description: Connective-tissue cliché named in Pass 2 inventory
    origin:
      pass: "Stage 3 template — Pass 2 voice-polish category"
      commit: "(in template)"
    allowlist: []

  - id: regressed-cliche-furthermore
    pattern: '\bFurthermore,'
    type: regex
    severity: MEDIUM
    category: named-llm-tic
    description: Connective-tissue cliché named in Pass 2 inventory
    origin:
      pass: "Stage 3 template — Pass 2 voice-polish category"
      commit: "(in template)"
    allowlist: []

  - id: regressed-cliche-that-being-said
    pattern: 'that being said'
    type: string
    severity: MEDIUM
    category: named-llm-tic
    description: Connective-tissue cliché named in Pass 2 inventory
    origin:
      pass: "Stage 3 template — Pass 2 voice-polish category"
      commit: "(in template)"
    allowlist: []

  # ===========================================================
  # Category 3: Render-failure patterns
  # Origin: publishing-pipeline commits d238f2c, cf24f57, 3208619
  # ===========================================================

  - id: regressed-render-tofu-box
    pattern: '□|�'
    type: regex
    severity: HIGH
    category: render-failure
    description: |
      Tofu-box / replacement-glyph character in source (likely paste
      artifact from a failed render output that got copied back into source).
    origin:
      pass: "Stage 4 render-integrity audit doctrine"
      commit: "d238f2c (Ch 5 + Ch 6 em-dash / approx-symbol fix)"
    allowlist: []

  - id: regressed-render-hyphen-minus-as-em-dash
    pattern: '[a-z] -- [a-z]'
    type: regex
    severity: MEDIUM
    category: render-failure
    description: |
      Two-hyphens-as-em-dash pattern. Should be U+2014 em-dash directly.
      Pandoc handles this in some configs but not all; render-safer to
      use the actual character.
    origin:
      pass: "Stage 4 render-integrity audit doctrine §3.1"
      commit: "(convention)"
    allowlist: []

  - id: regressed-render-approx-tilde
    pattern: '~([0-9])'
    type: regex
    severity: LOW
    category: render-failure
    description: |
      Approximation symbol rendered as tilde rather than U+2248 ≈.
      May be intentional in some contexts (informal "approximately" prefix);
      LOW severity for review.
    origin:
      pass: "Stage 4 render-integrity audit doctrine §3.1"
      commit: "(convention)"
    allowlist: []

  # ===========================================================
  # Category 4: Gate-decision-banned patterns
  # ===========================================================

  - id: regressed-gate-vendor-name-template
    pattern: '\b(VENDOR-NAME-PLACEHOLDER-1|VENDOR-NAME-PLACEHOLDER-2)\b'
    type: regex
    severity: HIGH
    category: gate-decision-banned
    description: |
      Template entry for vendor names held OUT per CEO-era NDA gate decision.
      Update with actual vendor names if the retrofit registry expansion
      identifies specific vendor-name-leakage risk. Currently a template
      placeholder.
    origin:
      pass: "CEO-era NDA gate decision (referenced in handoff)"
      commit: "(gate decision)"
    allowlist: []

  # ===========================================================
  # Category 5: Cross-chapter consistency-inventory items
  # Per pipeline doctrine §3.3 + tools/audits/ artifacts.
  # ===========================================================

  # The cross-chapter consistency inventory items (terminology + symbol +
  # flagship-equation canonical-name commitments) need to be populated from
  # tools/audits/cross-chapter-consistency-* artifacts. This is incremental
  # retrofit-side work; the seed entries below are placeholders for the
  # canonical pattern shape.

  - id: regressed-consistency-arp-rename-template
    pattern: 'asymmetric regret principle'
    type: string
    severity: LOW
    category: consistency-canon
    description: |
      Terminology rename pattern — example placeholder. The ARP
      canonical-naming decision (per tools/rigor-passes/commons_bonds_rigor_pass_2026-04-24_arp_rename_v1.0.0.md)
      established the canonical short-form. This entry is a template
      showing the consistency-canon pattern shape; retrofit expansion
      populates the actual deprecated forms.
    origin:
      pass: "ARP rename rigor pass (2026-04-24)"
      commit: "(see file commit)"
    allowlist: []

  # ===========================================================
  # NOTES FOR REGISTRY EXPANSION
  # ===========================================================
  #
  # Per pipeline doctrine §2.2 + handoff §4 + ratified decision #9, the
  # regressed-pattern registry is initially seeded by this doctrine session
  # and incrementally populated by per-chapter retrofit workstreams.
  #
  # Expected populated count post-retrofit: ~80-120 entries.
  #
  # Pattern-class extraction methodology for retrofit sessions:
  #
  # 1. For each chapter's Phase A rigor-pass artifacts (Pass 3.1 + 3.2 + 3.3),
  #    extract per-finding pattern-class entries. Finding-to-pattern-class
  #    extraction is appropriate when the finding represents a named pattern
  #    (e.g., "nostalgia tic"; "em-dash density") rather than a one-off
  #    substantive concern.
  #
  # 2. For each tools/audits/ artifact (cross-chapter consistency; apparatus
  #    register; flagship-terms defense), extract canonical-form commitments
  #    as consistency-canon entries. Deprecated forms (the patterns banned
  #    by the canonical-form commitment) become regressed-pattern entries.
  #
  # 3. For each Stage 4 render-audit artifact (when retrofit produces them),
  #    extract render-failure patterns as render-failure entries.
  #
  # 4. For each gate-decision artifact (e.g., CEO-era NDA decision), extract
  #    banned-pattern entries as gate-decision-banned entries.
  #
  # The per-chapter retrofit workstreams (per pipeline doctrine §9) include
  # registry expansion as a deliverable.

# ===== Scope configuration =====
#
# Same as scaffolding-patterns.yaml.

scope:
  include:
    - "manuscript/chapters/Chapter_*Draft*.md"
    - "manuscript/chapters/_AUTHORSNOTE*.md"
    - "manuscript/chapters/_Dedication.md"
    - "publishing/essay-drafts/**/*.md"
    - "publishing/op-eds/**/*.md"
  exclude:
    - "tools/**/*.md"
    - "alignment/**/*.md"
    - "publishing/strategy/**/*.md"
    - "archive/**/*.md"
    - "**/*GuidanceDoc*.md"
    - "manuscript/chapters/_BookLevelGuidance.md"
    - "publishing/**/templates/**/*.md"
    - "publishing/**/_inventory_*.md"
    - "publishing/**/archive/**/*.md"

# End of regressed-patterns.yaml
