  - id: regressed-consistency-oasi-trust-fund-year
    pattern: '\btrust fund [^.]{0,50}(2034|2035)\b'
    type: regex
    severity: HIGH
    category: consistency-canon
    description: |
      OASI Trust Fund exhaustion year canonical commitment. Per 2024
      Trustees Report: OASI alone exhausts 2033 (77% benefit ratio);
      OASDI-combined exhausts 2035 (83% benefit ratio). The chapter's
      canonical framing is OASI-alone per Ch 5 Phase C-α; new mentions
      should use 2033 unless explicitly switching to OASDI-combined
      framing (which requires the 77% → 83% cascade). Flagged Ch 5 F-V4
      at line 138 as internal-inconsistency.
    origin:
      pass: "Ch 5 Pass 1 fact-check MEDIUM-3 + Pass 2 F-V4 (line 138)"
      commit: "Ch 5 Phase C-α (verify)"
    allowlist: []

  - id: regressed-consistency-deepwater-cbo-attribution
    pattern: 'Congressional Budget Office [^.]{0,80}(one hundred and fifty|150) billion'
    type: regex
    severity: HIGH
    category: consistency-canon
    description: |
      CBO $150B Deepwater Horizon attribution is unsupportable. No CBO
      publication carries a $150B total-economic-losses figure for
      Deepwater Horizon. The aggregate is multi-source-defensible (US
      Travel Association + fishing + BP cumulative costs) but not CBO-
      attributable. Flagged Ch 5 F-V7 at line 46; resolved by
      multi-source aggregate framing.
    origin:
      pass: "Ch 5 Pass 2 voice-polish (F-V7) + Pass 1 MEDIUM-1"
      commit: "Ch 5 Phase C-β (verify)"
    allowlist: []

  - id: regressed-consistency-fed-emergency-lending-at-peak
    pattern: '(sixteen trillion|16T|\$16 ?trillion)[^.]{0,30}at peak'
    type: regex
    severity: HIGH
    category: consistency-canon
    description: |
      The $16T Federal Reserve emergency-lending figure (GAO 2011) is the
      cumulative sum of all loans across the crisis, NOT the peak
      outstanding balance. Peak outstanding was ~$1T late 2008; Bloomberg's
      $7.77T figure included guarantees + commitments. "At peak" framing is
      mis-attribution. Flagged Ch 5 F-V8 at line 82; resolved by
      "cumulative emergency loans across the crisis (per GAO 2011 audit)".
    origin:
      pass: "Ch 5 Pass 2 voice-polish (F-V8) + Pass 1 N-5"
      commit: "Ch 5 Phase C-β (verify)"
    allowlist: []

  - id: regressed-consistency-44b-trust-fund-framing
    pattern: '\$44 ?[Bb]illion\b'
    type: regex
    severity: MEDIUM
    category: consistency-canon
    description: |
      $44B figure canonical context per Ch 5 / Ch 6 reference: this is a
      Trust Fund figure, not a Program figure. Per commit cacb82d, Ch 2 +
      Ch 8 corrected from Program-framing drift to Trust-Fund-framing
      canonical. New occurrences should reference Trust Fund (not Program)
      unless cross-chapter consistency-inventory updates the canonical
      framing.
    origin:
      pass: "Cross-chapter consistency commitment"
      commit: "cacb82d (Ch 2 + Ch 8 correction)"
    allowlist: []

