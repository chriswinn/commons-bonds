# Build Environment — Render Baseline
#
# Per pipeline doctrine Stage 4 §2.1 + §3.3, this file records the
# known-good build-environment versions that Stage 4 render-integrity
# audits verify against.
#
# Update this file when the publishing-pipeline scripts run cleanly with
# a new toolchain version (e.g., after a pandoc upgrade is verified
# against all chapters); per Stage 4 doctrine, any change here triggers
# Stage 4 re-run for affected artifacts.
#
# Schema: opaque YAML key-value; consumers (Stage 4 audit sessions) read
# the values + verify the local environment matches.
#
# First populated 2026-05-17 from the remote-container pipeline that
# pre-rendered Ch 1 + Ch 5 + Ch 6 + TA at BASE commit 9ffad4e as the
# standardization-workstream comparison-baseline. File sizes for Ch 5 /
# Ch 6 / TA matched the Sandy packet artifacts (research/outreach/
# subjects/darity/) at byte-level for the markdown→PDF + DOCX paths,
# confirming this toolchain reproduces the Sandy packet pipeline.

build_environment:
  # Last verified
  last_verified: "2026-05-17"
  last_verified_commit: "9ffad4e"  # BASE used for 4-chapter pre-render

  # Pipeline identification
  pipeline_class: "docker-or-remote-container"   # docker (laptop via Colima) + remote-container (Anthropic cloud) share one canonical toolchain
  pipeline_canonical_status: "RATIFIED 2026-05-18 — Docker (laptop via Colima) + remote-container share one canonical toolchain via tools/scripts/install-render-toolchain.sh"
  canonical_decision_status: |
    Past renders via the laptop build-derivatives.sh pipeline had
    more render-failure findings than past remote-container renders
    (the Sandy packet artifacts at research/outreach/subjects/darity/
    being the best-rendering reference).

    Per 2026-05-18 author direction + the render-toolchain-
    containerization workstream (see tools/workstream-handoffs/
    render-toolchain-containerization-handoff_2026-05-18.md): the
    canonical pipeline is now apt-installed pandoc + xelatex +
    wkhtmltopdf + EB Garamond + DejaVu Serif on Ubuntu 24.04,
    consumed identically by Docker (laptop) and the remote-container
    (Anthropic cloud session). Chrome is NOT in the canonical
    toolchain — wkhtmltopdf is canonical for HTML→PDF per the Sandy
    packet (e6ddf92).

    Reproducibility: any context that runs tools/scripts/
    install-render-toolchain.sh ends up with this toolchain; --check
    mode verifies presence; --capture-stamp mode emits the actually-
    installed versions for stamp-update.

    Laptop-native commercial-Garamond + Chrome-preferred rendering
    remains a separate context for cases where laptop-native output
    is wanted; it is NOT the canonical-pipeline output.

  # Toolchain versions
  pandoc_version: "3.1.3"              # via apt: pandoc + pandoc-data
  xelatex_version: "TeX Live 2023/Debian (XeTeX 3.141592653-2.6-0.999995)"
  wkhtmltopdf_version: "0.12.6"        # used as HTML→PDF fallback in THIS container's 2026-05-17 pre-renders only; NOT canonical for canonical-pipeline output. Sandy packet TA PDF used Chrome.
  chrome_version: "TBD per past sessions"  # ⚠ canonical for HTML→PDF; was available in past remote-container sessions (e.g., commit e6ddf92 Sandy packet TA PDF 1.14MB); not available as non-snap binary in 2026-05-17 container, snap blocked, direct .deb download blocked by network policy. Open follow-up: container setup script that ensures Chrome (non-snap) available in future sessions.
  libreoffice_version: ""              # present but unused for canonical renders

  # Fonts (per Stage 4 doctrine §3.3 font convention)
  fonts:
    primary_body: "EB Garamond"
    primary_body_verified: "fonts-ebgaramond (apt)"
    math_font: ""                       # using fallback-header.tex map to DejaVu Serif for U+2014 + U+2248 coverage
    math_font_verified: "DejaVu Serif via fonts-dejavu (apt)"
    fallback_header: "tools/scripts/fallback-header.tex"

  # Publishing-pipeline scripts (canonical pinned 2026-05-18)
  scripts:
    canonical_pending: false
    canonical_for_docker_and_remote_container: "tools/scripts/build-derivatives-alt.sh"
    canonical_notes: |
      Inside Docker (laptop via Colima) + the remote-container,
      build-derivatives-alt.sh is canonical: defaults to
      MAIN_FONT="EB Garamond" (matches the apt-installed font) and
      auto-includes fallback-header.tex for EB Garamond's U+2014-bold
      + U+2248 coverage gaps via DejaVu Serif. wkhtmltopdf is the
      HTML→PDF engine since Chrome is intentionally not installed in
      the canonical Docker image.
    laptop_native: "tools/scripts/build-derivatives.sh"
    laptop_native_notes: |
      build-derivatives.sh stays in repo as the laptop-native script
      (commercial-Garamond + Chrome-preferred). Produces different
      output than the canonical Docker pipeline; useful for cases
      where laptop-native rendering is explicitly wanted. Not the
      canonical-pipeline output.
    fallback_header: "tools/scripts/fallback-header.tex"
    reference_docx: "tools/scripts/reference.docx"

  # Docker recipe (canonical containerized pipeline, ratified 2026-05-18)
  docker_recipe:
    dockerfile: "tools/scripts/Dockerfile.render"
    installer: "tools/scripts/install-render-toolchain.sh"
    base_image: "ubuntu:24.04"
    platform: "linux/amd64"   # strict; Rosetta or QEMU on Apple Silicon (~5 sec/render)
    chrome_installed: false   # intentional — mirrors remote-container; see workstream handoff §0
    session_start_hook: ".claude/settings.json (SessionStart hook gated on CLAUDE_CODE_REMOTE=true)"
    laptop_runtime: "Colima — brew install colima docker qemu lima-additional-guestagents; colima start --arch x86_64 --cpu 4 --memory 4"
    notes: |
      Per workstream handoff §4.3 + Stage 4 doctrine §3.3: Docker
      mirrors the remote-container workflow (NOT the laptop-native
      workflow). Strict --platform=linux/amd64 ensures byte-level
      reproducibility against remote-container (which is x86_64).
      The remote-container session uses install-render-toolchain.sh
      via the .claude/settings.json SessionStart hook OR via the
      Anthropic cloud-environment-UI setup script (recommended for
      faster session start due to environment caching).

  # Pandoc invocation tweak (recorded for reproducibility)
  pandoc_input_format_override: "markdown-yaml_metadata_block"
  pandoc_input_format_rationale: |
    Pandoc 3.x interprets the `---` separator at the top of chapter
    sources (between `---` line 1 and `---` line 5) as a YAML metadata
    block. The "By Chris Winn" line inside parses as an alias and
    pandoc fails with "Unknown alias `By`". Workaround: disable YAML
    metadata block detection via `-f markdown-yaml_metadata_block`.
    Past sessions that ran cleanly (e.g., Sandy packet generation in
    commit e6ddf92) may have used pandoc 2.x where YAML detection
    was less aggressive, OR may have invoked with a different `-f`.
    This override should be incorporated into build-derivatives.sh
    as a default for pandoc 3.x compatibility.

# Canonical-pipeline reference artifacts (Sandy packet)
#
# The Sandy packet (delivered to William Darity Jr. 2026-05-14 at commit
# e6ddf92) is the canonical style-and-byte reference for the apt-installed
# pipeline. Files at:
#   research/outreach/subjects/darity/Chapter_5_The_Accountability_Gap_with-citations_2026-05-14.{docx,pdf}
#   research/outreach/subjects/darity/Chapter_6_Three_Ways_of_Counting_with-citations_2026-05-14.{docx,pdf}
#   research/outreach/subjects/darity/Technical_Appendix_Commons_Bonds_with-citations_2026-05-14.{docx,pdf}
#
# Per the 2026-05-18 render-toolchain-containerization workstream's verification:
# Docker (Colima, --platform=linux/amd64) render of Ch 5/Ch 6 source at 9ffad4e
# produces .docx byte-exact against the comparison-baseline (Sandy with-citations
# docx within zip-metadata-timestamp tolerance) and .pdf within engine-version
# delta for HTML→PDF (TA PDF: same wkhtmltopdf class; minor configuration delta).
# Sandy's HTML→PDF path was wkhtmltopdf (not Chrome) per e6ddf92 — the
# canonical Docker pipeline does NOT install Chrome.

notes: |
  CANONICAL-PIPELINE RATIFIED 2026-05-18 (render-toolchain-containerization
  workstream): apt-installed pandoc + xelatex + wkhtmltopdf + EB Garamond +
  DejaVu Serif on Ubuntu 24.04. Same toolchain consumed identically by Docker
  (laptop via Colima) and the Anthropic remote-container. Single source of
  truth: tools/scripts/install-render-toolchain.sh + tools/scripts/Dockerfile.render.

  Reference renders (Sandy packet, canonical style baseline):
   - research/outreach/subjects/darity/ for Ch 5 + Ch 6 + TA (with-citations
     variants are the canonical-style reference per 2026-05-18 author direction).

  Earlier draft-time A/B comparison artifacts at tools/scripts/comparison-renders/
  were removed 2026-05-19 once the canonical pipeline decision rendered the
  laptop-vs-remote-container A/B work moot.

