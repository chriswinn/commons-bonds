# Scaffolding-Patterns Registry — invariant-gate corpus-hygiene scan
#
# Detects placeholders + drafting-template scaffolding + process-scaffolding
# vocabulary that should never appear in publisher-facing prose.
#
# Used by tools/scripts/check-corpus-invariants.sh per pipeline doctrine §2.1.
# Schema version 1.0.0; do not change schema without coordinating across
# script + all registry consumers.

schema_version: "1.0.0"
last_updated: "2026-06-09"
registry_type: "scaffolding"

# Severity tiers:
#   HIGH    — block: commit / stage transition refused; author must resolve.
#   MEDIUM  — flag: surface for review; do not block.
#   LOW     — informational: log only.
#
# Pattern types:
#   string  — literal substring match
#   regex   — POSIX extended regex
#   word    — whole-word match (regex with word boundaries auto-applied)

patterns:

  # ===== Category 1: Drafting placeholders =====

  - id: scaffold-todo
    pattern: 'TODO'
    type: word
    severity: HIGH
    category: drafting-placeholder
    description: TODO placeholder; never in publisher-facing prose
    allowlist: []

  - id: scaffold-tk
    pattern: 'TK'
    type: word
    severity: HIGH
    category: drafting-placeholder
    description: TK (to-come) placeholder used by editorial-pipeline drafters
    allowlist: []

  - id: scaffold-fixme
    pattern: 'FIXME'
    type: word
    severity: HIGH
    category: drafting-placeholder
    description: FIXME placeholder
    allowlist: []

  - id: scaffold-xxx
    pattern: 'XXX'
    type: word
    severity: HIGH
    category: drafting-placeholder
    description: XXX placeholder
    allowlist: []

  - id: scaffold-bracket-placeholder
    pattern: '\[(PLACEHOLDER|INSERT|TBD|DRAFT|BRACKET|INTERVIEW NEEDED|INTERVIEW|NEEDED|TODO|REVISIT|VERIFY|CONFIRM|CHECK|UPDATE)[^]]{0,80}\]'
    type: regex
    severity: HIGH
    category: drafting-placeholder
    description: |
      Bracket-placeholder pattern (e.g., [PLACEHOLDER X], [INSERT Y],
      [TBD], [INTERVIEW NEEDED — ...], [REVISIT after Colden], etc.).
      Caught Ch 2 lines 30 + 161 + 166 ([INTERVIEW NEEDED — ...]
      placeholders awaiting source-interview material) during 2026-05-17
      registry expansion.
    allowlist:
      - file: "manuscript/chapters/Chapter__2_TheMiner.md"
        line: 30
        rationale: "TRACKED — pending Ch 2 retrofit disposition per ch2-pipeline-retrofit-handoff_2026-05-17.md §3 'Interview-pending placeholders' option (a/b/c). [INTERVIEW NEEDED — Opening person] awaiting interview material (likely Colden / cold-outreach response). Resolve at Ch 2 retrofit; remove this allowlist entry in the same commit that resolves the placeholder."
      - file: "manuscript/chapters/Chapter__2_TheMiner.md"
        line: 161
        rationale: "TRACKED — pending Ch 2 retrofit disposition. [INTERVIEW NEEDED — The miner's voice] awaiting interview material. Resolve at Ch 2 retrofit."
      - file: "manuscript/chapters/Chapter__2_TheMiner.md"
        line: 166
        rationale: "TRACKED — pending Ch 2 retrofit disposition. [INTERVIEW NEEDED — The extraction-side portrait] awaiting interview material. Resolve at Ch 2 retrofit."

